```html id="finalclean"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>log</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #eaeaea;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    transition: opacity 0.6s ease;
}

/* center */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* lock */
#landing, #grid {
    display: none;
}

button {
    background: none;
    border: 1px solid #444;
    color: #eaeaea;
    padding: 10px 20px;
    cursor: pointer;
}
button:hover {
    background: #111;
}

/* grid */
#grid {
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #111;
}

.tile {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}
.tile:hover {
    background: #111;
}
.tile span {
    opacity: 0.2;
}
.tile:hover span {
    opacity: 1;
}

/* popup */
#popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: rgba(20,20,20,0.95);
    padding: 25px;
    border: 1px solid #333;
    display: none;
    max-width: 320px;
    text-align: center;
    opacity: 0;
    transition: 0.3s;
}
#popup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* final UI */
.final-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.final-card {
    border: 1px solid #333;
    padding: 40px 30px;
    text-align: center;
    max-width: 320px;
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px);
    animation: fadeUp 0.8s ease;
}

.line { opacity: 0.7; }
.divider {
    height: 1px;
    background: #333;
    margin: 20px 0;
}
.main { font-size: 20px; }
.sub { opacity: 0.8; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock" class="center">
    <p>Access required</p>
    <input type="password" id="mainPwd">
    <br><br>
    <button onclick="unlock()">Enter</button>
    <p id="lockHint"></p>
</div>

<!-- LANDING -->
<div id="landing" class="center">
    <div>You weren’t supposed to find this.<br><br>But you did.</div>
    <button onclick="enter()">Continue</button>
</div>

<!-- GRID -->
<div id="grid"></div>

<!-- POPUP -->
<div id="popup"></div>

<script>
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

let clicks = [];
let mainAttempts = 0;
let pwdAttempts = 0;

const tiles = [
"Log_01","Memory","Audio",
"Error","???.exe","Fragment",
"Signal","Hidden","Time"
];

/* unlock */
function unlock(){
 let val=document.getElementById("mainPwd").value.toLowerCase();
 let hint=document.getElementById("lockHint");

 if(val==="cabbage"){
  document.getElementById("lock").style.display="none";
  document.getElementById("landing").style.display="block";
 } else {
  mainAttempts++;
  hint.innerText=mainAttempts>=3?
  "Hint: it’s something you always call me… silly.":
  "Access denied.";
 }
}

/* enter */
function enter(){
 document.getElementById("landing").style.display="none";
 grid.style.display="grid";

 tiles.forEach((t,i)=>{
  let d=document.createElement("div");
  d.className="tile";
  d.innerHTML=`<span>${t}</span>`;
  d.onclick=()=>openTile(i);
  grid.appendChild(d);
 });
}

/* popup */
function show(content){
 popup.innerHTML=content+"<br><br><button onclick='closePop()'>Close</button>";
 popup.style.display="block";
 setTimeout(()=>popup.classList.add("show"),10);
}

function closePop(){
 popup.classList.remove("show");
 setTimeout(()=>popup.style.display="none",300);
}

/* tiles */
function openTile(i){
 clicks.push(i);

 switch(i){
  case 0:
    show("LOG_01:<br><br>You weren’t part of the plan.<br>Yet here we are.");
    break;

  case 1:
    show("Memory:<br><br>You were there.<br><br>That’s what mattered.");
    break;

  case 2:
    show(`<audio controls>
    <source src="jtor.mp3" type="audio/mpeg">
    </audio>`);
    break;

  case 3:
    show("System Error:<br><br>Unexpected attachment detected.<br><br>// no fix available");
    break;

  case 4:
    show(`<p>Encrypted file detected</p>
    <input type="password" id="pwd"><br><br>
    <button onclick="checkPwd()">Unlock</button>
    <p id="hint"></p>`);
    break;

  case 5:
    show("Fragment:<br><br>I don’t usually say things like this…<br><br>but with you, it’s different.");
    break;

  case 6:
    show("Signal:<br><br>Signal received.<br>Not ignored.");
    break;

  case 7:
    show("Hidden:<br><br>You stayed.<br><br>That’s rare.");
    break;

  case 8:
    show(`<p>IN // <span id="indiaTime"></span></p>
    <p>DE // <span id="germanyTime"></span></p>
    <hr>
    <p id="elapsed"></p>
    <p style="opacity:0.6;">Still here.</p>`);
    startClock();
    break;
 }

 checkSecret();
}

/* password */
function checkPwd(){
 let val=document.getElementById("pwd").value.toLowerCase();
 let hint=document.getElementById("hint");

 if(val==="cabbage"){
  popup.innerHTML="Access granted.<br><br>Of course you’d remember that.<br><br><button onclick='closePop()'>Close</button>";
 } else {
  pwdAttempts++;
  hint.innerText=pwdAttempts>=3?"Hint: 🥬":"Access denied.";
 }
}

/* clock */
function startClock(){
 let start=new Date("2026-01-14T00:00:00");

 function update(){
  let now=new Date();
  document.getElementById("indiaTime").innerText=
  now.toLocaleTimeString("en-IN",{timeZone:"Asia/Kolkata"});

  document.getElementById("germanyTime").innerText=
  now.toLocaleTimeString("en-DE",{timeZone:"Europe/Berlin"});

  let diff=now-start;
  let d=Math.floor(diff/(1000*60*60*24));
  let h=Math.floor((diff/(1000*60*60))%24);
  let m=Math.floor((diff/(1000*60))%60);

  document.getElementById("elapsed").innerText=`${d}d ${h}h ${m}m`;
 }

 update();
 setInterval(update,1000);
}

/* unlock final AFTER 5 sec */
function checkSecret(){
 let unique=new Set(clicks);

 if(unique.size===9){
  setTimeout(()=>revealFinal(),5000);
 }
}

/* final */
function revealFinal(){
 document.body.style.opacity="0";

 setTimeout(()=>{
  document.body.innerHTML=`
  <div class="final-container">
   <div class="final-card">
    <p class="line">I don’t say things often.</p>
    <p class="line">But when I do, I mean them.</p>

    <div class="divider"></div>

    <p class="main">You matter.</p>
    <p class="sub">More than you realize.</p>
   </div>
  </div>
  `;
  document.body.style.opacity="1";
 },600);
}
</script>

</body>
</html>
