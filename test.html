```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>log</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #eaeaea;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    transition: opacity 0.6s ease;
}

/* grain */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    pointer-events: none;
}

/* center */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* lock screen */
#lock {
    z-index: 10;
}

/* hide initially */
#landing, #grid {
    display: none;
}

button {
    background: none;
    border: 1px solid #444;
    color: #eaeaea;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 20px;
}
button:hover {
    background: #111;
}

/* grid */
#grid {
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #111;
}

.tile {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}
.tile:hover {
    background: #111;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
}

.tile span {
    opacity: 0.2;
}
.tile:hover span {
    opacity: 1;
}

/* popup */
#popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    padding: 25px;
    border: 1px solid #333;
    display: none;
    max-width: 320px;
    text-align: center;
    opacity: 0;
    transition: 0.3s;
}
#popup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* glitch */
.glitch {
    animation: glitch 0.3s infinite;
}
@keyframes glitch {
    0% { transform: translate(1px,-1px); }
    50% { transform: translate(-1px,1px); }
    100% { transform: translate(1px,1px); }
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock" class="center">
    <p>Access required</p>
    <input type="password" id="mainPwd" placeholder="Enter key">
    <br><br>
    <button onclick="unlock()">Enter</button>
    <p id="lockHint" style="opacity:0.6;"></p>
</div>

<!-- LANDING -->
<div id="landing" class="center">
    <div>You weren’t supposed to find this.<br><br>But you did.</div>
    <button onclick="enter()">Continue</button>
</div>

<!-- GRID -->
<div id="grid"></div>

<!-- POPUP -->
<div id="popup"></div>

<script>
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

let clicks = [];
let pwdAttempts = 0;
let mainAttempts = 0;

const tiles = [
    "Log_01","Memory","Audio",
    "Error","???.exe","Fragment",
    "Signal","Hidden","Time"
];

/* unlock */
function unlock() {
    let val = document.getElementById("mainPwd").value.toLowerCase();
    let hint = document.getElementById("lockHint");

    if(val === "cabbage") {
        document.getElementById("lock").style.display = "none";
        document.getElementById("landing").style.display = "block";
        return;
    }

    mainAttempts++;
    hint.innerText = mainAttempts >= 3
        ? "Hint: it’s something you always call me… silly."
        : "Access denied.";
}

/* enter */
function enter() {
    document.getElementById("landing").style.display = "none";
    grid.style.display = "grid";
    generateGrid();
}

/* grid */
function generateGrid() {
    tiles.forEach((name, i) => {
        let t = document.createElement("div");
        t.className = "tile";
        t.innerHTML = `<span>${name}</span>`;
        t.onclick = () => openTile(i);
        grid.appendChild(t);
    });
}

/* popup */
function showPopup(content) {
    popup.innerHTML = content + "<br><br><button onclick='closePop()'>Close</button>";
    popup.style.display = "block";
    setTimeout(()=>popup.classList.add("show"),10);
}

function closePop() {
    popup.classList.remove("show");
    setTimeout(()=>popup.style.display="none",300);
}

/* tiles */
function openTile(i) {
    clicks.push(i);

    switch(i) {

        case 0:
            showPopup(`LOG_01:<br><br>You weren’t part of the plan.<br>Yet here we are.`);
            break;

        case 1:
            showPopup(`Memory:<br><br>You were there.<br><br>That’s what mattered.`);
            break;

        case 2:
            showPopup(`<p>Signal playback available.</p>
            <audio controls>
            <source src="jtor.mp3" type="audio/mpeg">
            </audio>`);
            break;

        case 3:
            popup.innerHTML = `<div id="type"></div><br><button onclick='closePop()'>Close</button>`;
            popup.style.display = "block";
            setTimeout(()=>popup.classList.add("show"),10);
            typeText(document.getElementById("type"),
`System Error:

Unexpected attachment detected.

// no fix available`);
            glitch();
            checkSecret();
            return;

        case 4:
            showPopup(`<p>Encrypted file detected</p>
            <input type="password" id="pwd"><br><br>
            <button onclick="checkPwd()">Unlock</button>
            <p id="hint" style="opacity:0.6;"></p>`);
            break;

        case 5:
            showPopup(`Fragment:<br><br>I don’t usually say things like this…<br><br>but with you, it’s different.`);
            break;

        case 6:
            showPopup(`Signal:<br><br>Signal received.<br>Not ignored.`);
            break;

        case 7:
            showPopup(`Hidden:<br><br>You stayed.<br><br>That’s rare.`);
            break;

        case 8:
            showPopup(`<p>IN // <span id="indiaTime"></span></p>
            <p>DE // <span id="germanyTime"></span></p>
            <hr>
            <p id="elapsed"></p>
            <p style="opacity:0.6;">Still here.</p>`);
            startClocks();
            break;
    }

    checkSecret();
}

/* effects */
function glitch() {
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),300);
}

function typeText(el,text,speed=25){
    el.innerHTML="";
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,speed);
        }
    }
    t();
}

/* password inside */
function checkPwd(){
    let val=document.getElementById("pwd").value.toLowerCase();
    let hint=document.getElementById("hint");

    if(val==="cabbage"){
        popup.innerHTML=`Access granted.<br><br>Of course you’d remember that.<br><br><button onclick='closePop()'>Close</button>`;
        return;
    }

    pwdAttempts++;
    hint.innerText=pwdAttempts>=3?"Hint: 🥬":"Access denied.";
}

/* clocks */
function startClocks(){
    function update(){
        const now=new Date();

        document.getElementById("indiaTime").innerText=
        now.toLocaleTimeString("en-IN",{timeZone:"Asia/Kolkata"});

        document.getElementById("germanyTime").innerText=
        now.toLocaleTimeString("en-DE",{timeZone:"Europe/Berlin"});

        const startDate=new Date("2026-01-14T00:00:00");
        const diff=now-startDate;

        const d=Math.floor(diff/(1000*60*60*24));
        const h=Math.floor((diff/(1000*60*60))%24);
        const m=Math.floor((diff/(1000*60))%60);

        document.getElementById("elapsed").innerText=`${d}d ${h}h ${m}m`;
    }
    update();
    setInterval(update,1000);
}

/* unlock final */
function checkSecret(){
    let unique=new Set(clicks);
    if(unique.size===9){
        setTimeout(()=>revealFinal(),600);
    }
}

function revealFinal(){
    document.body.style.opacity="0";
    setTimeout(()=>{
        document.body.innerHTML=`
        <div class="center">
            <p>I don’t say things often.</p>
            <p>But when I do, I mean them.</p>
            <br>
            <p>—</p>
            <br>
            <p>You matter.</p>
            <p>More than you realize.</p>
        </div>`;
        document.body.style.opacity="1";
    },600);
}

/* enter key */
document.addEventListener("keydown", function(e){
    if(e.key==="Enter") unlock();
});
</script>

</body>
</html>
